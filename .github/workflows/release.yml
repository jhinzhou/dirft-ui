name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm harness
      - run: pnpm meta:check
      - name: Publish npm packages
        run: |
          publish_if_needed() {
            package_name="$1"
            package_filter="$2"
            package_json_path="$3"

            local_version=$(PACKAGE_JSON_PATH="$package_json_path" node -e "const fs=require('fs'); const p=process.env.PACKAGE_JSON_PATH; console.log(JSON.parse(fs.readFileSync(p, 'utf8')).version)")

            if npm view "${package_name}@${local_version}" version >/dev/null 2>&1; then
              echo "Skip ${package_name}@${local_version}: already published."
            else
              echo "Publishing ${package_name}@${local_version}..."
              pnpm --filter "$package_filter" publish --access public
            fi
          }

          publish_if_needed "drift-design" "./packages/ui" "packages/ui/package.json"
          publish_if_needed "create-drift-design" "./packages/create-drift-design" "packages/create-drift-design/package.json"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
